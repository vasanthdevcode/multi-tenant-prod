
#user  nobody;
worker_processes  1;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       mime.types;
    default_type  application/octet-stream;

    #log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
    #                  '$status $body_bytes_sent "$http_referer" '
    #                  '"$http_user_agent" "$http_x_forwarded_for"';

    #access_log  logs/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    #keepalive_timeout  0;
    keepalive_timeout  65;

    #gzip  on;

    proxy_cache_path cache keys_zone=apicache:10m max_size=500m inactive=30d;
    proxy_cache_path clientcache keys_zone=clientcache:10m max_size=500m inactive=30d;


    upstream backend-container-load-balancer {
        # least_conn;
        # least_time header; or least_time last_byte
        # ip_hash
        # weight=3 should add with server
        server backend-app-service:3000;
    }

        log_format detailed_log
        '$remote_addr [$time_local] '
        '"$request" $status '
        'rt=$request_time '
        'urt=$upstream_response_time '
        'cache=$upstream_cache_status '
        'upstream=$upstream_addr '
        'tenant="$http_x_tenant_id"';

    server {
        listen       8080;
        server_name  localhost;
        underscores_in_headers on;

        # access_log  logs/host.access.log  main;
        # access_log logs/headers.log detailed_log;
        access_log /dev/stdout;


        location /api/ {
           proxy_pass http://backend-container-load-balancer;
           proxy_cache apicache;
           proxy_cache_valid 200 302 30d;
           add_header X-Cache-Status $upstream_cache_status always;
           proxy_cache_bypass $arg_nocache;
           proxy_no_cache $arg_nocache;
        #    add_header X-Tenant-Id $http_x_tenant_id;
        #    proxy_set_header Host $host; 
        #    proxy_set_header X-Real-IP $remote_addr; 
        #    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
        #    proxy_set_header X-Tenant-Id $http_x_tenant_id;
        #    proxy_pass_header X-Tenant-Id;
        #    proxy_ignore_headers Cache-Control;
        }

        location / {
           proxy_pass http://frontend-app-service;
           proxy_cache clientcache;
           proxy_cache_valid 200 302 30d;
           add_header X-Cache-Status $upstream_cache_status always;
        #    allow 103.99.148.171;
        #    deny all;
        #    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        #    add_header Pragma "no-cache";
        #    add_header Expires 0;
        #    add_header X-Tenant-Id $http_x_tenant_id;
        #    proxy_set_header Host $host; 
        #    proxy_set_header X-Real-IP $remote_addr; 
        #    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
        #    proxy_set_header X-Tenant-Id $http_x_tenant_id;
        #    proxy_pass_header X-Tenant-Id;
        #    proxy_ignore_headers Cache-Control;
        }

        location /nginx_status {
        stub_status;
        allow 127.0.0.1;
        deny all;
        }

        #error_page  404              /404.html;

        # redirect server error pages to the static page /50x.html
        #
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }

        # proxy the PHP scripts to Apache listening on 127.0.0.1:80
        #
        #location ~ \.php$ {
        #    proxy_pass   http://127.0.0.1;
        #}

        # pass the PHP scripts to FastCGI server listening on 127.0.0.1:9000
