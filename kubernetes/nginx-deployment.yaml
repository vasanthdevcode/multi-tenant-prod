apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: nginx-gateway

  template:
    metadata:
      labels:
        app: nginx-gateway

    spec:
      containers:
        - name: nginx-gateway
          image: vasanthdevcode/nginx-gateway:v1

          ports:
            - containerPort: 80