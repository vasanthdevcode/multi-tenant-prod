apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment

spec:
  replicas: 3

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
        - name: backend
          image: vasanthdevcode/backend-app:v15

          ports:
            - containerPort: 3000

          envFrom:
            - configMapRef:
                name: backend-config

            - secretRef:
                name: backend-secret